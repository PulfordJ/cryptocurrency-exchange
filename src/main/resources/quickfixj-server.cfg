# QuickFIX/J acceptor configuration for the mock exchange.
# SocketAcceptPort is overridden at runtime from the exchange.fix.port property.
[default]
ConnectionType=acceptor
SocketAcceptPort=9876
StartTime=00:00:00
EndTime=00:00:00
HeartBtInt=30
UseDataDictionary=Y
DataDictionary=FIX44.xml
ValidateUserDefinedFields=N
ValidateIncomingMessage=Y
ResetOnLogon=Y
ResetOnLogout=Y
ResetOnDisconnect=Y

[session]
BeginString=FIX.4.4
SenderCompID=EXCHANGE
TargetCompID=CLIENT
