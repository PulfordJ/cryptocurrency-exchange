# QuickFIX/J initiator configuration for the FIX test client.
# SocketConnectPort is overridden at runtime to the acceptor's test port.
[default]
ConnectionType=initiator
SocketConnectHost=127.0.0.1
SocketConnectPort=9876
StartTime=00:00:00
EndTime=00:00:00
HeartBtInt=5
ReconnectInterval=1
UseDataDictionary=Y
DataDictionary=FIX44.xml
ValidateUserDefinedFields=N
ResetOnLogon=Y
ResetOnLogout=Y
ResetOnDisconnect=Y

[session]
BeginString=FIX.4.4
SenderCompID=CLIENT
TargetCompID=EXCHANGE
